<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden; /* no page scroll */
    }
    .wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 12px;
      box-sizing: border-box;
    }
    video {
      max-width: min(720px, 100%);
      max-height: calc(100vh - 24px);
      width: auto;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <video controls playsinline>
      <source src="unplayable.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
<a href="unplayable.mp4">unplayable.mp4</a>
</body>
</html>
